name: Deploy New Yokosuka

on:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy to Server
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          # Robust SSH key handling via ssh-agent
          eval $(ssh-agent -s)
          
          # Debug: check if secret is set and has correct header
          if [ -z "$DEPLOY_KEY" ]; then echo "ERROR: DEPLOY_SSH_KEY is empty!"; exit 1; fi
          echo "Key header: $(echo "$DEPLOY_KEY" | head -n 1 | cut -c 1-15)..."
          
          echo "$DEPLOY_KEY" | tr -d '\r' | ssh-add -
          
          SSH_OPTS="-o StrictHostKeyChecking=no"
          HOST="ubuntu@54.68.252.253"
          APP_DIR="/home/ubuntu/app/new-yokosuka"

          # Upload frontend
          ssh $SSH_OPTS $HOST "mkdir -p $APP_DIR/dist"
          tar czf - -C dist . | ssh $SSH_OPTS $HOST "cd $APP_DIR/dist && tar xzf -"

          # Reload Caddy
          ssh $SSH_OPTS $HOST "sudo systemctl reload caddy"
