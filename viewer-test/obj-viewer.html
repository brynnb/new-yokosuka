<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wudecon OBJ Viewer</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #15171b;
        color: #e8eaed;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 300px;
        height: 100vh;
      }

      .viewport {
        position: relative;
        min-width: 0;
        background: #bbb8ad;
      }

      #renderCanvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
      }

      .status {
        position: absolute;
        left: 12px;
        bottom: 12px;
        max-width: min(560px, calc(100vw - 336px));
        padding: 7px 9px;
        border: 1px solid rgb(0 0 0 / 0.16);
        border-radius: 6px;
        background: rgb(245 245 240 / 0.9);
        color: #1f242b;
        font-size: 12px;
        line-height: 1.35;
        white-space: pre-wrap;
      }

      .panel {
        display: grid;
        align-content: start;
        gap: 12px;
        min-height: 0;
        overflow: auto;
        border-left: 1px solid #2c3138;
        background: #20242b;
        padding: 14px;
      }

      h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 650;
        letter-spacing: 0;
      }

      fieldset {
        display: grid;
        gap: 9px;
        margin: 0;
        padding: 11px;
        border: 1px solid #363c45;
        border-radius: 6px;
        background: #252a32;
      }

      legend {
        padding: 0 4px;
        color: #cdd4dc;
        font-size: 12px;
        font-weight: 650;
      }

      label {
        display: grid;
        gap: 4px;
        color: #dce1e7;
        font-size: 12px;
      }

      select,
      button {
        min-height: 30px;
        border: 1px solid #454c57;
        border-radius: 6px;
        background: #171a20;
        color: #f1f3f6;
        font: inherit;
        font-size: 12px;
      }

      select {
        width: 100%;
        padding: 6px 7px;
      }

      button {
        cursor: pointer;
        padding: 6px 8px;
      }

      button:hover {
        background: #222832;
      }

      input[type="checkbox"] {
        width: 17px;
        min-height: 17px;
        accent-color: #8fb9ff;
      }

      .switch-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: #dce1e7;
        font-size: 12px;
      }

      .checkbox-stack {
        display: grid;
        gap: 7px;
      }

      .material-list {
        display: grid;
        max-height: 260px;
        overflow: auto;
        border: 1px solid #343a43;
        border-radius: 6px;
        background: #191d23;
      }

      .material-row {
        display: grid;
        grid-template-columns: 18px 1fr auto;
        align-items: center;
        gap: 8px;
        min-height: 28px;
        padding: 5px 7px;
        border-bottom: 1px solid #2a3038;
        font-size: 12px;
      }

      .swatch {
        width: 14px;
        height: 14px;
        border: 1px solid rgb(255 255 255 / 0.45);
        border-radius: 3px;
      }

      .material-name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      @media (max-width: 780px) {
        .app {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(0, 1fr) auto;
        }

        .panel {
          max-height: 42vh;
          border-left: 0;
          border-top: 1px solid #2c3138;
        }

        .status {
          max-width: calc(100vw - 24px);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <main class="viewport">
        <canvas id="renderCanvas"></canvas>
        <div id="status" class="status">Loading...</div>
      </main>
      <aside class="panel">
        <h1>wudecon OBJ Viewer</h1>

        <fieldset>
          <legend>Display</legend>
          <label>
            Material Mode
            <select id="materialMode">
              <option value="mtl" selected>MTL diffuse</option>
              <option value="id">Material IDs</option>
              <option value="wire">Wireframe</option>
            </select>
          </label>
          <label>
            UV Target
            <select id="uvTarget">
              <option value="atlas" selected>Head Atlas</option>
              <option value="all">All Materials</option>
            </select>
          </label>
          <label>
            Atlas Region
            <select id="uvRegion">
              <option value="whole" selected>Whole Texture</option>
              <option value="side">Side/Back Half</option>
              <option value="face">Face Half</option>
            </select>
          </label>
          <label>
            Mirror Side/Back
            <select id="uvMirrorSide">
              <option value="off" selected>Off</option>
              <option value="negative-x">Mirror X &lt; 0</option>
              <option value="positive-x">Mirror X &gt; 0</option>
            </select>
          </label>
          <div class="checkbox-stack" role="group" aria-label="UV Rotation">
            <label class="switch-row">
              <span>Rotate 90 CW</span>
              <input id="uvRotateCw" type="checkbox" />
            </label>
            <label class="switch-row">
              <span>Rotate 90 CCW</span>
              <input id="uvRotateCcw" type="checkbox" />
            </label>
            <label class="switch-row">
              <span>Rotate 180</span>
              <input id="uvRotate180" type="checkbox" />
            </label>
          </div>
          <div class="checkbox-stack" role="group" aria-label="UV Transform">
            <label class="switch-row">
              <span>Swap U/V</span>
              <input id="uvSwap" type="checkbox" />
            </label>
            <label class="switch-row">
              <span>Flip U</span>
              <input id="uvFlipU" type="checkbox" />
            </label>
            <label class="switch-row">
              <span>Flip V</span>
              <input id="uvFlipV" type="checkbox" />
            </label>
          </div>
          <label class="switch-row">
            <span>Backface Culling</span>
            <input id="backfaceCulling" type="checkbox" />
          </label>
          <button id="frameButton" type="button">Frame</button>
        </fieldset>

        <fieldset>
          <legend>Materials</legend>
          <div id="materialList" class="material-list"></div>
        </fieldset>
      </aside>
    </div>
    <script type="module" src="./obj-viewer.js"></script>
  </body>
</html>
