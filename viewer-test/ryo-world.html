<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ryo World Test</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #17191d;
        color: #eceff3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 300px;
        height: 100vh;
      }

      .viewport {
        position: relative;
        min-width: 0;
        background: #bfc1bb;
      }

      #renderCanvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
      }

      .status {
        position: absolute;
        left: 12px;
        bottom: 12px;
        padding: 7px 9px;
        border: 1px solid rgb(0 0 0 / 0.18);
        border-radius: 6px;
        background: rgb(246 246 241 / 0.88);
        color: #20242a;
        font-size: 12px;
        line-height: 1.35;
        white-space: pre;
      }

      .panel {
        min-height: 0;
        overflow: auto;
        border-left: 1px solid #2c3138;
        background: #20242a;
      }

      .panel-inner {
        display: grid;
        gap: 14px;
        padding: 14px;
      }

      h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 650;
        letter-spacing: 0;
      }

      fieldset {
        display: grid;
        gap: 9px;
        margin: 0;
        padding: 11px;
        border: 1px solid #363c45;
        border-radius: 6px;
        background: #252a31;
      }

      legend {
        padding: 0 4px;
        color: #cdd4dc;
        font-size: 12px;
        font-weight: 650;
      }

      label {
        display: grid;
        gap: 4px;
        color: #dce1e7;
        font-size: 12px;
      }

      select,
      button {
        min-height: 30px;
        border: 1px solid #454c57;
        border-radius: 6px;
        background: #171a20;
        color: #f1f3f6;
        font: inherit;
        font-size: 12px;
      }

      select {
        width: 100%;
        padding: 6px 7px;
      }

      button {
        cursor: pointer;
        padding: 6px 8px;
      }

      button:hover {
        background: #222832;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <main class="viewport">
        <canvas id="renderCanvas"></canvas>
        <div id="status" class="status">Loading...</div>
      </main>
      <aside class="panel">
        <div class="panel-inner">
          <h1>Ryo World Test</h1>

          <fieldset>
            <legend>Motion</legend>
            <label>
              Mode
              <select id="motionMode">
                <option value="auto">Auto</option>
                <option value="walk">Walk</option>
                <option value="run">Run</option>
                <option value="rest">Rest</option>
              </select>
            </label>
            <label>
              Movement
              <select id="movementSource">
                <option value="root-motion">MOTN root</option>
                <option value="manual-speed">Manual speed</option>
              </select>
            </label>
            <div class="buttons">
              <button id="pauseButton" type="button">Pause</button>
              <button id="resetButton" type="button">Reset</button>
            </div>
          </fieldset>

          <fieldset>
            <legend>View</legend>
            <div class="buttons">
              <button id="frameButton" type="button">Frame</button>
              <button id="labButton" type="button">Lab</button>
            </div>
          </fieldset>
        </div>
      </aside>
    </div>

    <script type="module" src="./ryo-world.js"></script>
  </body>
</html>
